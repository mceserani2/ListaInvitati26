<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Lista Invitati</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestione Lista Invitati</h1>
    <div class="form-container">
        <h2>Aggiungi un Invitato</h2>
        <form id="form_invitati" action="#">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
            <label for="cognome">Cognome:</label>
            <input type="text" id="cognome" name="cognome" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Email" required>
            <button type="submit" id="btn-aggiungi" class="btn">Aggiungi Invitato</button>
        </form>
        <hr/>
    </div>
    <div class="tools-container">
        <h2>Lista degli Invitati</h2>
        <button id="btn-ordina" class="btn">Ordina</button>
        <span id="ricerca-testo">
            <label for="search">Cerca:</label>
            <input type="text" id="search" placeholder="Cerca...">
        </span>
        <span id="filtra">
            <label for="filtro">Filtra:</label>
            <select id="filtro">
                <option value="tutti">Tutti</option>
                <option value="confermati">Confermati</option>
                <option value="non_confermati">Non confermati</option>
            </select>
        </span>
    </div>
    <div class="list-container">
        <ul id="lista_invitati"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
